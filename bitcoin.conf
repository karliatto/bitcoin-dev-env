# Bitcoin Core config for the regtest dev environment.
# Lives outside the datadir (test/bitcoin) so `just reset` doesn't delete it.
# Passed to bitcoind explicitly via -conf in the Justfile.

regtest=1

[regtest]
server=1
rpcuser=myuser
rpcpassword=mypass
txindex=1
fallbackfee=0.0002
minimumchainwork=0
